services:
  scan-immo-service:
    container_name: scan-immo-service
    build:
      context: /opt/scan_immo_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=3000
      - BROWSER_TIMEOUT_MS=45000
      - NAVIGATION_TIMEOUT_MS=30000
      - MAX_IMAGES=50
    ports:
      - "3010:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
